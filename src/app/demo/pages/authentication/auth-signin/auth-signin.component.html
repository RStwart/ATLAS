<div class="auth-wrapper copa-wrapper">

  <!-- Orbs decorativas temáticas -->
  <span class="copa-orb copa-orb--1"></span>
  <span class="copa-orb copa-orb--2"></span>
  <span class="copa-orb copa-orb--3"></span>
  <span class="copa-orb copa-orb--4"></span>

  <!-- Bolas de futebol flutuantes -->
  <span class="copa-ball copa-ball--1">⚽</span>
  <span class="copa-ball copa-ball--2">⚽</span>
  <span class="copa-ball copa-ball--3">⚽</span>

  <div class="auth-content">
    <div class="card copa-card">
      <div class="card-body text-center">

        <!-- Cabeçalho Copa -->
        <div class="copa-header mb-3">
          <span class="copa-flag">🇧🇷</span>
          <span class="copa-badge">⚽ Copa do Mundo 2026</span>
        </div>

        <div class="copa-lock mb-3">
          <i class="feather icon-unlock"></i>
        </div>

        <h3 class="copa-title mb-4">Login</h3>

        <!-- ALERTAS SUCESSO/ERRO -->
        <div *ngIf="sucesso" class="alert alert-success">
          {{ sucesso }}
        </div>
        <div *ngIf="erro" class="alert alert-danger">
          {{ erro }}
        </div>

        <!-- Campo Email -->
        <div class="input-group mb-3">
          <input
            type="email"
            class="form-control copa-input"
            placeholder="Email"
            [(ngModel)]="email"
            required
          />
        </div>

        <!-- Campo Senha -->
        <div class="input-group mb-4">
          <input
            type="password"
            class="form-control copa-input"
            placeholder="Senha"
            [(ngModel)]="senha"
            required
          />
        </div>

        <!-- Checkbox -->
        <div class="form-group text-start mb-4">
          <div class="checkbox checkbox-fill d-inline">
            <input type="checkbox" name="checkbox-fill-1" id="checkbox-fill-a1" checked />
            <label for="checkbox-fill-a1" class="cr">Salvar dados</label>
          </div>
        </div>

        <!-- Botão Login -->
        <button class="btn copa-btn-login mb-4" (click)="onLogin()">
          ⚽ Entrar
        </button>

        <!-- Logo + rodapé -->
        <div class="copa-card-footer">
          <div class="copa-card-logo">
            <img src="assets/images/ICONE_ATLAS_PNG.png" alt="Logo" />
            <div class="copa-card-logo-text">
              <span class="copa-card-logo-name">NETWHALE</span>
              <span class="copa-card-logo-sub">SOLUTIONS</span>
            </div>
          </div>
          <p class="copa-footer-text">Acesso restrito a colaboradores autorizados</p>
        </div>

      </div>
    </div>
  </div>

</div>
