<div class="row">
  <div class="col-xl-12">
    <app-card cardTitle="Produtos" [options]="false" [buttonh]="true" buttonTitle="Adicionar produto" [buttonAction]="toggleFormulario.bind(this)">

      <div class="row">
        <div *ngFor="let produto of produtosPaginados" class="col-md-4 mb-4">
          <div class="product-card">

            <!-- Imagem do produto -->
            <div class="product-card__img-wrap">
              <ng-container *ngIf="produto.imagemUrl; else semImagem">
                <img [src]="produto.imagemUrl" alt="{{ produto.nome }}" class="product-card__img" />
              </ng-container>
              <ng-template #semImagem>
                <div class="product-card__no-img">
                  <i class="feather icon-image"></i>
                  <span>Sem imagem</span>
                </div>
              </ng-template>
              <div class="product-card__price-badge">{{ produto.preco | currency: 'BRL' }}</div>
            </div>

            <!-- Corpo -->
            <div class="product-card__body">
              <h5 class="product-card__title">{{ produto.nome }}</h5>
              <p class="product-card__description">{{ produto.descricao }}</p>

              <!-- Botões de ação -->
              <div class="product-card__actions">
                <button class="prod-action-btn prod-action-btn--green" (click)="editarProduto(produto)">
                  <i class="feather icon-edit-2 me-1"></i>Editar
                </button>
                <button class="prod-action-btn prod-action-btn--red" (click)="deletarProduto(produto.id_produto)">
                  <i class="feather icon-trash-2 me-1"></i>Excluir
                </button>
              </div>
            </div>

          </div>
        </div>
      </div>
    </app-card>
  </div>
</div>


<div *ngIf="mostrarFormulario" class="row">
  <div class="col-sm-12">
    <app-card cardTitle="Adicionar Produto" [options]="false">
      <div class="form-container">
        <form (ngSubmit)="adicionarProduto()">
          <div class="form-group">
            <label for="nome">Nome</label>
            <input id="nome" class="form-control" [(ngModel)]="novoProduto.nome" name="nome" required />
          </div>
          <div class="form-group">
            <label for="descricao">Descrição</label>
            <textarea id="descricao" class="form-control" [(ngModel)]="novoProduto.descricao" name="descricao"></textarea>
          </div>
          <div class="form-group">
            <label for="preco">Preço</label>
            <input id="preco" type="number" class="form-control" [(ngModel)]="novoProduto.preco" name="preco" required />
          </div>
          <div class="form-group">
            <label for="quantidade_estoque">Quantidade em Estoque</label>
            <input id="quantidade_estoque" type="number" class="form-control" [(ngModel)]="novoProduto.quantidade_estoque" name="quantidade_estoque" required />
          </div>
          <!-- Campo de upload de imagem -->
          <div class="form-group">
            <label for="imagem">Imagem do Produto</label>
            <input type="file" class="form-control" (change)="onFileSelected($event)" name="imagem" />
          </div>
          <button type="submit" class="btn btn-success">Salvar</button>
          <button type="button" class="btn btn-secondary" (click)="toggleFormulario()">Cancelar</button>
        </form>
      </div>
    </app-card>
  </div>
</div>



<!-- Formulário de Edição -->
<div class="atlas-modal" *ngIf="produtoEmEdicao">
  <div class="modal-dialog modal-dialog-centered" style="max-width: 520px;">
    <div class="atlas-modal-content">

      <!-- Header -->
      <div class="modal-header-custom modal-header-custom--green">
        <div class="d-flex align-items-center gap-3">
          <div class="modal-header-icon">
            <i class="feather icon-edit-2"></i>
          </div>
          <div>
            <p class="mb-0 modal-header-label">Produtos</p>
            <h5 class="mb-0 text-white fw-bold">Editar Produto</h5>
          </div>
        </div>
        <button type="button" (click)="cancelarEdicao()" class="modal-close-btn">&times;</button>
      </div>

      <!-- Body -->
      <div class="modal-body-custom">
        <form id="form-editar-produto" (ngSubmit)="salvarEdicao()">
          <div class="row g-3">

            <div class="col-12">
              <label class="field-label">Nome</label>
              <input id="edit-nome" type="text" class="field-input" [(ngModel)]="produtoEmEdicao.nome" name="edit-nome" required />
            </div>

            <div class="col-12">
              <label class="field-label">Descrição</label>
              <textarea id="edit-descricao" class="field-input" rows="3" [(ngModel)]="produtoEmEdicao.descricao" name="edit-descricao" style="resize:none;"></textarea>
            </div>

            <div class="col-md-6">
              <label class="field-label">Preço</label>
              <input id="edit-preco" type="number" class="field-input" [(ngModel)]="produtoEmEdicao.preco" name="edit-preco" required />
            </div>

            <div class="col-md-6">
              <label class="field-label">Quantidade em Estoque</label>
              <input id="edit-quantidade" type="number" class="field-input" [(ngModel)]="produtoEmEdicao.quantidade_estoque" name="edit-quantidade" required />
            </div>

          </div>
        </form>
      </div>

      <!-- Footer -->
      <div class="modal-footer-custom">
        <button type="button" (click)="cancelarEdicao()" class="btn-modal-cancel">Cancelar</button>
        <button type="submit" form="form-editar-produto" class="btn-modal-primary btn-modal-primary--green">
          <i class="feather icon-check me-1"></i>Salvar Alterações
        </button>
      </div>

    </div>
  </div>
</div>
<div class="atlas-backdrop" *ngIf="produtoEmEdicao"></div>

<!-- Paginação original -->
<nav aria-label="Page navigation" class="mt-3">
  <ul class="pagination justify-content-center">
    <li class="page-item" [class.disabled]="currentPage === 1" (click)="changePage(currentPage - 1)">
      <span class="page-link">Anterior</span>
    </li>
    <li class="page-item" *ngFor="let page of pages" [class.active]="page === currentPage" (click)="changePage(page)">
      <span class="page-link">{{ page }}</span>
    </li>
    <li class="page-item" [class.disabled]="currentPage === totalPages" (click)="changePage(currentPage + 1)">
      <span class="page-link">Próximo</span>
    </li>
  </ul>
</nav>
